<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8" />
        <title>Hexagonal Game of Life</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <button id="controlsToggle" class="controls-toggle" aria-expanded="false" aria-controls="controls">
            <i class="fa fa-bars" aria-hidden="true"></i>
            <span class="sr-only">Menu</span>
        </button>
        <button id="pauseToggle" class="top-btn" aria-pressed="false">
            <i class="fa fa-pause" aria-hidden="true"></i>
            <span class="sr-only">Pause</span>
        </button>
        <button id="clearBtn" class="top-btn" title="Clear">
            <i class="fa fa-eraser" aria-hidden="true"></i>
            <span class="sr-only">Clear</span>
        </button>
        <button id="stepBtn" class="top-btn" title="Step">
            <i class="fa fa-step-forward" aria-hidden="true"></i>
            <span class="sr-only">Step one generation</span>
        </button>
        <button id="randomize" class="top-btn" title="Randomize">
            <i class="fa fa-random" aria-hidden="true"></i>
            <span class="sr-only">Randomize</span>
        </button>
        <div id="controls" class="controls" aria-hidden="false">
            <label><input type="checkbox" id="darkToggle"> Dark mode</label>
            <label>Cell size: <input type="range" id="sizeRange" min="8" max="120" value="50"></label>
            <label>Density: <input type="range" id="densityRange" min="0" max="0.5" step="0.01" value="0.10"></label>
            <label>FPS: <input type="range" id="fpsRange" min="1" max="60" value="10"></label>
            <label>Rule:
                <select id="ruleSelect">
                    <option value="b245s25">B245/S25</option>
                    <option value="b2s34">B2/S34</option>
                </select>
            </label>
            <label>On setting change:
                <select id="onSettingChange">
                    <option value="preserve">Keep cells</option>
                    <option value="clear">Clear</option>
                    <option value="randomize">Randomize</option>
                </select>
            </label>
        </div>
        <canvas class="canvas"></canvas>
        <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
        <script src="main.js"></script>
    </body>
</html>
